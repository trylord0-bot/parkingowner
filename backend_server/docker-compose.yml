version: "3.9"

services:
  # ── MariaDB ─────────────────────────────────────────────────────────────────
  db:
    image: mariadb:11
    container_name: parking_owner_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_pw
      MYSQL_DATABASE: parking_owner_db
      MYSQL_USER: parkingowner
      MYSQL_PASSWORD: parkingowner_pw
    ports:
      - "3303:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible object storage) ────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: parking_owner_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - ./minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── API Server ───────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: parking_owner_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: "mysql://parkingowner:parkingowner_pw@db:3306/parking_owner_db"
      MINIO_ENDPOINT: minio
    ports:
      - "3000:3000"
    volumes:
      - ./firebase-service-account.json:/app/firebase-service-account.json:ro

volumes:
  db_data:
  minio_data:
